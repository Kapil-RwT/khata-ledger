server:
  port: ${PORT:8080}      # Render/Heroku-style: the platform injects PORT, default to 8080 locally

spring:
  application:
    name: khata-ledger

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/khataledger}
    username: ${DB_USERNAME:khata}
    password: ${DB_PASSWORD:khata}

  jpa:
    hibernate:
      ddl-auto: validate   # Flyway owns the schema; Hibernate only validates entities match it
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
    open-in-view: false    # disable OSIV; forces explicit lazy-loading boundaries (interview talking point)

  flyway:
    enabled: true
    baseline-on-migrate: true

  mvc:
    problemdetails:
      enabled: true   # RFC 7807 problem details for errors

# JWT secret should be overridden in production via env var.
# Must be at least 32 bytes (256 bits) for HS256.
app:
  security:
    jwt:
      secret: ${JWT_SECRET:change-me-this-secret-must-be-at-least-32-chars}
      expiration-minutes: 60
    # Comma-separated origins allowed to call the API.
    # Local default lets Vite dev server (5173) and any localhost port through.
    # In production set ALLOWED_ORIGINS to your Vercel URL, e.g.
    #   ALLOWED_ORIGINS=https://khata-ledger.vercel.app
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:*}
  ai:
    gemini:
      api-key: ${GEMINI_API_KEY:}       # MUST come from env var. Leave blank to use the local intent router (no external call).
      model: gemini-flash-lite-latest
      base-url: https://generativelanguage.googleapis.com
  reminder:
    overdue-after-days: 7

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
    com.khataledger: DEBUG
